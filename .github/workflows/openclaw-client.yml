name: OpenClaw Agent Client

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Task for the agent'
        required: true
        default: 'Analyze the repository and suggest improvements.'

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install
        
      - name: Run OpenClaw Client
        env:
          OPENCLAW_API_URL: ${{ secrets.OPENCLAW_API_URL }}
        run: npx tsx client.ts "${{ github.event.inputs.message }}"
